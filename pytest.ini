[pytest]
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
    ignore::DeprecationWarning:asyncio.*
asyncio_mode = strict
markers =
    integration: tests that hit external libraries or services (e.g. real mem0 introspection)
    no_gil_safe: marks tests that should pass under free-threaded CPython (PEP 703)
